user www-data;
worker_processes auto;
pid /run/nginx.pid;

events {
    worker_connections 1024;
}

http {

    ##
    # Basic settings
    ##
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    ##
    # Logging
    ##
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log warn;

    ##
    # Real IP (Cloudflare)
    ##
    real_ip_header CF-Connecting-IP;
    set_real_ip_from 173.245.48.0/20;
    set_real_ip_from 103.21.244.0/22;
    set_real_ip_from 103.22.200.0/22;
    set_real_ip_from 103.31.4.0/22;
    # add remaining CF ranges as needed

    ##
    # WebSocket handling
    ##
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    ##
    # Proxy defaults
    ##
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_set_header Upgrade           $http_upgrade;
    proxy_set_header Connection        $connection_upgrade;

    proxy_buffering off;
    proxy_read_timeout 300;

    # DEFAULT / FALLBACK
    server {
        listen 80 default_server;
        server_name _;
        return 444;
    }

    ##
    # MAIN WEBSITE
    ##
    server {
        server_name www.wigiwee.com wigiwee.com;

        location / {
            proxy_pass http://192.168.1.4:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
    ##
    # IMMICH SERVICE
    ##
    server {
        listen 80;
        server_name immich.wigiwee.com;

        location / {
            proxy_pass http://192.168.1.6:2283;
        }
    }
    server {
        listen 80;
        server_name uptime.wigiwee.com;

        location / {
            proxy_pass http://192.168.1.4:3001;
        }
    }
    server {
        listen 80;
        server_name gotify.wigiwee.com;

        location / {
            proxy_pass http://192.168.1.4:8023;
        }
    }
    server {
        listen 80;
        server_name nvr.wigiwee.com;

        location / {
            proxy_pass https://192.168.1.6:8971;
        }
    }
    server {
        listen 80;
        server_name bitwarden.wigiwee.com;

        location / {
            proxy_pass http://192.168.1.5:9445;
        }
    }
    server {
        listen 80;
        server_name cloud.wigiwee.com;

        location / {
            proxy_pass http://192.168.1.5:8099;
        }
            # REQUIRED for Seafile
        client_max_body_size 0;
        proxy_connect_timeout 3600;
        proxy_read_timeout 3600;
        proxy_send_timeout 3600;
        send_timeout 3600;
        location /seafhttp {
            rewrite ^/seafhttp(.*)$ $1 break;
            proxy_pass http://192.168.1.5:8082;

            client_max_body_size 0;
            proxy_buffering off;

            proxy_connect_timeout 3600;
            proxy_read_timeout 3600;
            proxy_send_timeout 3600;

            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
    server {
        listen 80;

        server_name jellyfin.wigiwee.com;

        client_max_body_size 20M;

        # Trust Cloudflare IPs (IMPORTANT)
        set_real_ip_from 127.0.0.1;
        real_ip_header CF-Connecting-IP;

        # Security headers (safe with Cloudflare)
        add_header X-Content-Type-Options "nosniff";

        add_header Content-Security-Policy "
        default-src https: data: blob:;
        img-src 'self' https:;
        style-src 'self' 'unsafe-inline';
        script-src 'self' 'unsafe-inline' https://www.gstatic.com https://www.youtube.com blob:;
        worker-src 'self' blob:;
        connect-src 'self';
        object-src 'none';
        font-src 'self';
    ";

        location / {
            proxy_pass http://192.168.1.6:8096;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;

            proxy_http_version 1.1;

            # Jellyfin streaming requirements
            proxy_buffering off;
            proxy_request_buffering off;

            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        location /socket {
            proxy_pass http://192.168.1.6:8096;

            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto https;
        }
    }

}