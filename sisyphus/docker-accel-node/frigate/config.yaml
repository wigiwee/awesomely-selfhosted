record:
  enabled: true
  retain:
    days: 15
    mode: all
  alerts:
    retain:
      days: 30
      mode: motion
  detections:
    retain:
      days: 30
      mode: motion

semantic_search:
  enabled: false
  model_size: large
face_recognition:
  enabled: true
  model_size: large
lpr:
  enabled: false
classification:
  bird:
    enabled: false
notifications:
  enabled: true
  email: user@email.com 

