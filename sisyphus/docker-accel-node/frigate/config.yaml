mqtt:
  host: mqtt
  topic_prefix: frigate

version: 0.16-0

objects:
  track:
    - person
  filters:
    person:
      min_score: 0.8

detectors:
  cpu1:
    type: cpu

model:
  model_type: yolonas

# detect:
#   enabled: true
#   fps: 8

cameras:
  D1:
    enabled: true
    ffmpeg:
      hwaccel_args: preset-nvidia-h264
      output_args:
        record: preset-record-generic-audio-aac
      inputs:
        - path: 
            rtsp://user:pass@192.168.1.xxx:554/cam/realmonitor?channel=1&subtype=0
          input_args: preset-rtsp-restream
          roles: [record]

  D2:
    enabled: true
    ffmpeg:
      hwaccel_args: preset-nvidia-h264
