version: "3.9"

services:
  jupyter:
    image: jupyter-gpu
    container_name: jupyter-gpu
    build: .
    ports:
      - "9999:9999"
    volumes:
      - ./workspace:/workspace
    working_dir: /workspace
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped

